name: codecrafters-shell
version: 0.1.0.0
license: BSD3

dependencies:
  - base >= 4.19 && < 5
  - mtl
  - monadlist
  - process
  - directory
  - filepath

library:
  source-dirs: src

executables:
  codecrafters-shell-exe:
    main: Main.hs
    source-dirs: app
    dependencies:
      - codecrafters-shell
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
      - -Wall
      - -Werror=incomplete-patterns

tests:
  codecrafters-shell-test:
    main: Test.hs
    source-dirs: test
    dependencies:
      - codecrafters-shell
      - tasty
      - tasty-hunit
    ghc-options:
      - -Wall
